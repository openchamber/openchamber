services:
  alias-ade:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alias-ade
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/alias-ade:/home/alias-ade/.config/alias-ade
      - ./data/opencode/share:/home/alias-ade/.local/share/opencode
      - ./data/opencode/state:/home/alias-ade/.local/state/opencode
      - ./data/opencode/config:/home/alias-ade/.config/opencode
      - ./data/ssh:/home/alias-ade/.ssh
      - ./workspaces:/home/alias-ade/workspaces
    #environment:
    # ALIAS_ADE_HOST: 0.0.0.0  # Bind address (default in Docker: 0.0.0.0)
    # UI_PASSWORD: your_secure_password_here  # Uncomment to set UI password
    # ALIAS_ADE_TUNNEL_PROVIDER: cloudflare
    # ALIAS_ADE_TUNNEL_MODE: quick  # quick | managed-remote | managed-local
    # ALIAS_ADE_TUNNEL_HOSTNAME: app.example.com  # required for managed-remote
    # ALIAS_ADE_TUNNEL_TOKEN: your_cloudflare_token  # required for managed-remote
    # ALIAS_ADE_TUNNEL_CONFIG: /home/alias-ade/.cloudflared/config.yml  # optional for managed-local
    # OH_MY_OPENCODE: true # enable oh-my-opencode
    # OPENCODE_HOST: http://172.17.0.1:4096 # Connect to external OpenCode server
    # OPENCODE_SKIP_START: true # skip start opencode
    # ALIAS_ADE_OPENCODE_HOSTNAME: 0.0.0.0 # Bind OpenCode to all interfaces
    restart: unless-stopped
