name: Windows Smoke Test

on:
  push:
    branches:
      - 'refactor/**'
      - main
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-windows:
    name: Smoke test on Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test
