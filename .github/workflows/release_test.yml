name: Release Test (Debug Sidecar Architecture)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to test (e.g., 1.8.5)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (skip publishing)'
        required: false
        default: false
        type: boolean

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  create-test-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=1.8.5-test" >> $GITHUB_OUTPUT
          fi

  build-desktop-macos:
    needs: create-test-release
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
            platform: darwin-aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
            platform: darwin-x86_64
    outputs:
      version: ${{ needs.create-test-release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build UI package
        run: bun run --cwd packages/ui build

      - name: Create temporary Tauri config (disable updater artifacts)
        run: |
          # 使用 jq 临时修改配置，禁用 updater artifacts
          jq '.bundle.createUpdaterArtifacts = false' \
            packages/desktop/src-tauri/tauri.conf.json \
            > packages/desktop/src-tauri/tauri.conf.tmp.json
          mv packages/desktop/src-tauri/tauri.conf.tmp.json \
            packages/desktop/src-tauri/tauri.conf.json

      - name: Build Desktop app (unsigned, no updater, WITH FIX)
        run: |
          # Set target architecture to ensure sidecar binary matches
          export TAURI_ENV_TARGET_TRIPLE=${{ matrix.target }}
          bun run --cwd packages/desktop build
          bun run --cwd packages/desktop tauri build --target ${{ matrix.target }}
        env:
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.target }}

      - name: Verify sidecar architecture
        run: |
          set -euo pipefail

          SIDECAR_PATH="packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/OpenChamber.app/Contents/MacOS/openchamber-server"

          if [ ! -f "$SIDECAR_PATH" ]; then
            echo "❌ Error: sidecar binary not found at $SIDECAR_PATH"
            exit 1
          fi

          echo "🔍 Verifying sidecar architecture in $SIDECAR_PATH"

          SIDEARCH_ARCH=$(file "$SIDECAR_PATH" | grep -oE 'x86_64|aarch64' | head -1)
          EXPECTED_ARCH=$(echo "${{ matrix.target }}" | grep -oE 'x86_64|aarch64' | head -1)

          echo "   Sidecar binary: $SIDEARCH_ARCH"
          echo "   Expected: $EXPECTED_ARCH"

          if [ "$SIDEARCH_ARCH" != "$EXPECTED_ARCH" ]; then
            echo "❌ ERROR: Sidecar architecture mismatch!"
            echo "   Expected: $EXPECTED_ARCH"
            echo "   Got: $SIDEARCH_ARCH"
            echo "   This confirms the sidecar architecture bug"
          else
            echo "✅ Sidecar architecture matches: $SIDEARCH_ARCH"
          fi

      - name: Prepare test artifacts
        run: |
          mkdir -p artifacts
          VERSION="${{ needs.create-test-release.outputs.version }}"

          # Copy DMG
          DMG_PATH="packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg"
          if ls $DMG_PATH 1> /dev/null 2>&1; then
            DMG_FILE=$(ls $DMG_PATH | head -n 1)
            DMG_NAME="OpenChamber_${VERSION}_${{ matrix.platform }}.dmg"
            cp "$DMG_FILE" "artifacts/$DMG_NAME"
          else
            echo "Error: DMG file not found at $DMG_PATH"
            exit 1
          fi

          echo "Successfully prepared artifacts:"
          ls -lh artifacts/

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-dmg-${{ matrix.platform }}
          path: artifacts/*.dmg
          retention-days: 3
