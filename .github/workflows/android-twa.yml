name: Android TWA Build

on:
  push:
    branches:
      - main
      - feat/android-apk
    paths:
      - 'packages/android-twa/**'
      - '.github/workflows/android-twa.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/android-twa/**'
      - '.github/workflows/android-twa.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (apk or aab)'
        required: false
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
          - both

env:
  BUN_VERSION: '1.3.5'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test packages/android-twa

  build:
    name: Build Android TWA
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feat/android-apk'
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'openchamber123' }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'openchamber123' }}
      TWA_HOST_NAME: ${{ secrets.TWA_HOST || 'opencode.ai' }}
      TWA_DEFAULT_URL: ${{ secrets.TWA_DEFAULT_URL || 'https://opencode.ai' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('packages/android-twa/configurable-wrapper/**/*.gradle*', 'packages/android-twa/configurable-wrapper/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate signing key
        run: |
          if [ ! -f packages/android-twa/android.keystore ]; then
            keytool -genkeypair -alias openchamber \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -keystore packages/android-twa/android.keystore \
              -storepass "$KEYSTORE_PASSWORD" \
              -dname "CN=OpenChamber, OU=Mobile, O=OpenChamber, L=Remote, ST=Remote, C=US"
          fi

      - name: Create local.properties
        run: |
          PROP_FILE=packages/android-twa/configurable-wrapper/local.properties
          echo "keystore.path=../android.keystore" > "$PROP_FILE"
          echo "keystore.alias=openchamber" >> "$PROP_FILE"
          echo "keystore.password=$KEYSTORE_PASSWORD" >> "$PROP_FILE"
          echo "keystore.keyPassword=$KEY_PASSWORD" >> "$PROP_FILE"
          echo "twa.hostName=$TWA_HOST_NAME" >> "$PROP_FILE"
          echo "twa.defaultUrl=$TWA_DEFAULT_URL" >> "$PROP_FILE"

      - name: Build APK
        run: bun run android:build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: packages/android-twa/configurable-wrapper/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

