name: Android TWA Build

on:
  push:
    branches:
        - main
        - feat/android-apk
    paths:
      - 'packages/android-twa/**'
      - '.github/workflows/android-twa.yml'
  pull_request:
    branches:
    - main
    paths:
    - 'packages/android-twa/**'
    - '.github/workflows/android-twa.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (apk or aab)'
        required: false
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
          - both

env:
  BUN_VERSION: '1.3.5'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-action@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test packages/android-twa

  build:
    name: Build Android TWA
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feat/android-apk'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-action@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('packages/android-twa/configurable-wrapper/**/*.gradle*', 'packages/android-twa/configurable-wrapper/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate configuration
        if: github.event_name == 'workflow_dispatch' || github.repository == 'openchamber/openchamber'
        run: |
        if [ -z "${{ secrets.KEYSTORE_PASSWORD || 'openchamber123' }}" ]; then
          echo "::error::KEYSTORE_PASSWORD secret not configured"
          exit 1
        fi
        if [ -z "${{ secrets.KEY_PASSWORD || 'openchamber123' }}" ]; then
          echo "::error::KEY_PASSWORD secret not configured"
          exit 1
        fi

      - name: Generate signing key
        if: github.event_name == 'workflow_dispatch' || github.repository == 'openchamber/openchamber'
        run: |
          if [ ! -f packages/android-twa/android.keystore ]; then
            keytool -genkeypair -alias openchamber \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -keystore packages/android-twa/android.keystore \
          -storepass "${{ secrets.KEYSTORE_PASSWORD || 'openchamber123' }}" \
              -dname "CN=OpenChamber, OU=Mobile, O=OpenChamber, L=Remote, ST=Remote, C=US"
          fi

      - name: Create local.properties
        run: |
          cat > packages/android-twa/configurable-wrapper/local.properties << EOF
          keystore.path=../../android.keystore
          keystore.alias=openchamber
        keystore.password=${{ secrets.KEYSTORE_PASSWORD || 'openchamber123' }}
        keystore.keyPassword=${{ secrets.KEY_PASSWORD || 'openchamber123' }}
          twa.hostName=${{ secrets.TWA_HOST || 'opencode.ai' }}
          twa.defaultUrl=${{ secrets.TWA_DEFAULT_URL || 'https://opencode.ai' }}
          EOF

      - name: Build APK
        if: github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == 'both' || github.event.inputs.build_type == ''
        run: bun run android:build

      - name: Build AAB
        if: github.event.inputs.build_type == 'aab' || github.event.inputs.build_type == 'both'
        run: bun run android:build:aab

      - name: Upload APK
        if: hashFiles('packages/android-twa/configurable-wrapper/app/build/outputs/apk/release/app-release.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: packages/android-twa/configurable-wrapper/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload AAB
        if: hashFiles('packages/android-twa/configurable-wrapper/app/build/outputs/bundle/release/app-release.aab') != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: packages/android-twa/configurable-wrapper/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

